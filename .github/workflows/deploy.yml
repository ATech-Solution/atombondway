name: Build & Deploy

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL_PROD: ${{ secrets.DEV_SITE_URL }}
          NEXT_PUBLIC_DOMAIN_PROD: ${{ secrets.DEV_SITE_URL }}
          PAYLOAD_PUBLIC_SERVER_URL_PROD: ${{ secrets.DEV_SITE_URL }}
        run: npm run build

      # Copy .next/static into standalone so the server can serve it
      - name: Prepare standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          # Copy public/ but exclude media/ (user uploads live on the server)
          rsync -a --exclude='media/' public/ .next/standalone/public/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload build to server
        run: |
          # Ensure destination exists
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'mkdir -p /home/deploy/dev/.next/standalone'

          # Sync standalone bundle → matches ecosystem.config.js args: '.next/standalone/server.js'
          rsync -az --delete \
            --exclude='public/media' \
            .next/standalone/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/deploy/dev/.next/standalone/

      - name: Copy ecosystem config
        run: |
          # Patch cwd, db path, and app name so dev runs as a separate PM2 process
          sed \
            -e 's|/home/deploy/atombondway/|/home/deploy/dev/|g' \
            -e "s|name: 'company-profile'|name: 'company-profile-dev'|g" \
            -e "s|PORT: 3000|PORT: 3001|g" \
            -e "s|atombondway.com|dev.atombondway.com|g" \
            ecosystem.config.js > ecosystem.config.dev.js
          scp ecosystem.config.dev.js \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/deploy/dev/ecosystem.config.js

      - name: Restart app with PM2
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -l -s' << 'EOF'
            cd /home/deploy/dev
            pm2 delete company-profile-dev 2>/dev/null || true
            pm2 start ecosystem.config.js --env production
            pm2 save
          EOF
